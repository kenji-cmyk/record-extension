<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --danger: #dc2626;
        --danger-strong: #b91c1c;
        --danger-soft: #fef2f2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 320px;
        margin: 0;
        font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        padding: 18px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 28px;
        padding: 5px 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--panel);
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #94a3b8;
      }

      [data-state="recording"] .status-dot {
        background: var(--danger);
        box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.12);
      }

      .surface {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
      }

      .label {
        margin: 0 0 4px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
      }

      #recordingDuration {
        margin: 0 0 14px;
        font-variant-numeric: tabular-nums;
        font-size: 36px;
        font-weight: 750;
        line-height: 1;
      }

      .source {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 0;
        border-top: 1px solid var(--border);
        color: var(--muted);
      }

      .source strong {
        color: var(--text);
        font-size: 13px;
      }

      .actions {
        display: grid;
        margin-top: 16px;
      }

      button {
        width: 100%;
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      button:focus-visible {
        outline: 3px solid rgba(15, 118, 110, 0.28);
        outline-offset: 2px;
      }

      #startRecord {
        background: var(--accent);
      }

      #startRecord:hover {
        background: var(--accent-strong);
      }

      #stopRecord {
        background: var(--danger);
      }

      #stopRecord:hover {
        background: var(--danger-strong);
      }

      #errorMessage {
        margin-top: 12px;
        padding: 10px 12px;
        border: 1px solid #fecaca;
        border-radius: 8px;
        background: var(--danger-soft);
        color: var(--danger-strong);
        font-size: 13px;
      }

      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Tab Recorder</h1>
        <div id="recordingStatus" class="status-pill" data-state="idle">
          <span class="status-dot" aria-hidden="true"></span>
          Ready to record this tab
        </div>
      </header>

      <section class="surface">
        <p class="label">Duration</p>
        <p id="recordingDuration">00:00</p>

        <div class="source">
          <strong>Audio source</strong>
          <span>Current tab only</span>
        </div>

        <div class="actions">
          <button id="startRecord" type="button">Start recording</button>
          <button id="stopRecord" type="button" hidden>Stop and save</button>
        </div>

        <div id="errorMessage" role="alert" hidden></div>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
